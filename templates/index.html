<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>AI-Driven Phishing Email Detection</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/style.css" />

    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body>
    <div class="hero-band">
      <svg
        class="shield-icon"
        viewBox="0 0 24 24"
        width="52"
        height="52"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M12 2 L20 5.5 V11 C20 16.2 16.6 20.6 12 22 C7.4 20.6 4 16.2 4 11 V5.5 Z"
          fill="#ffffff"
          stroke="#ef4444"
          stroke-width="1.6"
        />
        <path d="M12 2 L20 5.5 V11 C20 16.2 16.6 20.6 12 22 Z" fill="#ef4444" />
        <path
          d="M8.7 11.6 L11 14 L15.6 9.2"
          fill="none"
          stroke="#ffffff"
          stroke-width="1.6"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
      <h1>AI-Driven Phishing Email Detection</h1>
      <p class="subtitle">Machine Learning Based Email Security System</p>
    </div>

    <div class="container py-5">
      <div class="wrap">
        <hr />

        <label class="form-label" for="email">📧 Paste Email</label>
        <textarea
          id="email"
          class="form-control"
          rows="10"
          placeholder="Paste the email content here..."
        ></textarea>

        <div class="text-center mt-4">
          <button class="btn-analyze" onclick="predictEmail()">
            🔍 Analyze Email
          </button>
        </div>

        <hr />

        <div id="verdictBanner" class="verdict-banner">
          <span id="verdictIcon" class="verdict-icon">–</span>
          <div>
            <p id="prediction" class="verdict-text">-</p>
          </div>
        </div>

        <div class="row mt-4 g-4">
          <div class="col-md-6">
            <div class="section-block">
              <h4>Confidence</h4>
              <div class="progress mt-3" style="height: 28px">
                <div id="confidenceBar" class="progress-bar" style="width: 0%">
                  0%
                </div>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="section-block">
              <h4>Score Breakdown</h4>
              <canvas id="pieChart"></canvas>
            </div>
          </div>
        </div>

        <div class="row mt-3">
          <div class="section-block">
            <div id="gauge"></div>
          </div>
        </div>

        <div class="row mt-3 g-3">
          <div class="col-md-4">
            <div class="stat-block">
              <h5>Characters</h5>
              <h3 id="charCount">0</h3>
            </div>
          </div>
          <div class="col-md-4">
            <div class="stat-block">
              <h5>Words</h5>
              <h3 id="wordCount">0</h3>
            </div>
          </div>
          <div class="col-md-4">
            <div class="stat-block">
              <h5>URLs</h5>
              <h3 id="urlCount">0</h3>
            </div>
          </div>
        </div>

        <div class="section-block mt-4">
          <h4>Security Recommendation</h4>
          <p id="recommendation">Paste an email and click Analyze.</p>
        </div>
      </div>
    </div>

    <footer class="black-footer">&copy; 2026 Boddu Swathi Sree</footer>

    <script src="/static/script.js"></script>
  </body>
</html>
